<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Media Bot | Statistika</title>
    
    <!-- Three.js 3D kutubxonasi -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
            overflow: hidden;
            color: white;
        }
        
        /* 3D Canvas */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        /* Kontent (yuqori qatlam) */
        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            text-align: center;
            padding: 20px;
        }
        
        /* Logo va sarlavha */
        .logo {
            font-size: 70px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fff, #a855f7, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(168,85,247,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
            font-size: 1rem;
        }
        
        /* Statistika kartalari */
        .stats-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 50px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            min-width: 200px;
        }
        
        .stat-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.2);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border-color: rgba(168,85,247,0.5);
        }
        
        .stat-icon {
            font-size: 45px;
            margin-bottom: 15px;
        }
        
        .stat-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
        }
        
        .stat-number {
            font-size: 55px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Tugmalar */
        .buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .btn {
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: white;
            box-shadow: 0 4px 15px rgba(168,85,247,0.4);
        }
        
        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(168,85,247,0.6);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }
        
        /* Footer */
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        /* Yuklash animatsiyasi */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .stat-card { padding: 20px 25px; }
            .stat-number { font-size: 40px; }
            .btn { padding: 12px 25px; font-size: 14px; }
            .logo { font-size: 50px; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div class="content">
    <div class="logo">🎯</div>
    <h1>Media Yuklab Oluvchi Bot</h1>
    <div class="subtitle">📥 Yopiq kanallar | 🎵 Musiqa | 📸 Instagram | 🎬 Video</div>
    
    <div class="stats-container">
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-label">Obunachilar</div>
            <div class="stat-number" id="users-count">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">📥</div>
            <div class="stat-label">Yuklab olishlar</div>
            <div class="stat-number" id="downloads-count">--</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div class="stat-label">Qo'llab-quvvatlovchilar</div>
            <div class="stat-number" id="supporters-count">--</div>
        </div>
    </div>
    
    <div class="buttons">
        <button class="btn btn-primary" onclick="openBot()">
            🤖 Botga o‘tish
        </button>
        <button class="btn btn-secondary" onclick="shareBot()">
            📤 Ulashish
        </button>
    </div>
    
    <div class="footer">
        ✨ Bepul xizmat | Xalqimiz uchun | 24/7 ishlaydi
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    
    // 3D sahna yaratish
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2a);
    
    // Kamera
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 5);
    
    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);
    
    // ========== 3D OBYEKTLAR ==========
    
    // 1. Asosiy aylanuvchi shar
    const sphereGeometry = new THREE.SphereGeometry(1.2, 64, 64);
    const sphereMaterial = new THREE.MeshStandardMaterial({
        color: 0xa855f7,
        emissive: 0x3b0764,
        roughness: 0.3,
        metalness: 0.7,
        emissiveIntensity: 0.5
    });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    scene.add(sphere);
    
    // 2. Atrofidagi kichik sharlar (orbita)
    const particles = [];
    const colors = [0xff6b6b, 0x4ecdc4, 0x45b7d1, 0x96ceb4, 0xffeaa7, 0xdfe6e9, 0xa855f7, 0xec4899];
    
    for (let i = 0; i < 24; i++) {
        const particleGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const particleMat = new THREE.MeshStandardMaterial({ color: colors[i % colors.length], emissiveIntensity: 0.3 });
        const particle = new THREE.Mesh(particleGeo, particleMat);
        scene.add(particle);
        particles.push({
            mesh: particle,
            angle: (i / 24) * Math.PI * 2,
            radius: 1.8,
            speed: 0.5 + Math.random() * 0.5
        });
    }
    
    // 3. Atrofidagi yulduzlar
    const starGeometry = new THREE.BufferGeometry();
    const starCount = 800;
    const starPositions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        starPositions[i * 3] = (Math.random() - 0.5) * 200;
        starPositions[i * 3 + 1] = (Math.random() - 0.5) * 200;
        starPositions[i * 3 + 2] = (Math.random() - 0.5) * 50 - 20;
    }
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);
    
    // 4. Halqa (torus)
    const torusGeometry = new THREE.TorusGeometry(1.5, 0.05, 64, 300);
    const torusMaterial = new THREE.MeshStandardMaterial({ color: 0xec4899, emissive: 0x831843, emissiveIntensity: 0.3 });
    const torus = new THREE.Mesh(torusGeometry, torusMaterial);
    scene.add(torus);
    
    // 5. Yana bir halqa (turli burchakda)
    const torus2Geometry = new THREE.TorusGeometry(1.65, 0.03, 64, 300);
    const torus2Material = new THREE.MeshStandardMaterial({ color: 0x06b6d4, emissive: 0x164e63, emissiveIntensity: 0.3 });
    const torus2 = new THREE.Mesh(torus2Geometry, torus2Material);
    torus2.rotation.x = Math.PI / 2;
    scene.add(torus2);
    
    // Yorug'liklar
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);
    
    const pointLight = new THREE.PointLight(0xffffff, 1);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);
    
    const pointLight2 = new THREE.PointLight(0xa855f7, 0.8);
    pointLight2.position.set(-3, 2, 4);
    scene.add(pointLight2);
    
    const backLight = new THREE.PointLight(0xec4899, 0.5);
    backLight.position.set(0, 0, -3);
    scene.add(backLight);
    
    // Animatsiya
    let time = 0;
    
    function animate() {
        requestAnimationFrame(animate);
        time += 0.01;
        
        // Asosiy shar aylanishi
        sphere.rotation.y = time * 0.5;
        sphere.rotation.x = Math.sin(time * 0.3) * 0.3;
        
        // Halqalar aylanishi
        torus.rotation.x = time * 0.3;
        torus.rotation.z = time * 0.2;
        torus2.rotation.z = time * 0.4;
        
        // Kichik sharlar orbitada
        particles.forEach((p, i) => {
            const angle = p.angle + time * p.speed;
            const x = Math.cos(angle) * p.radius;
            const z = Math.sin(angle) * p.radius;
            const y = Math.sin(angle * 2) * 0.3;
            p.mesh.position.set(x, y, z);
        });
        
        // Yulduzlar sekin aylanishi
        stars.rotation.y = time * 0.02;
        stars.rotation.x = time * 0.01;
        
        // Kamera harakati
        camera.position.x = Math.sin(time * 0.1) * 0.2;
        camera.position.y = Math.cos(time * 0.15) * 0.1;
        camera.lookAt(0, 0, 0);
        
        renderer.render(scene, camera);
    }
    
    animate();
    
    // Oyna o‘lchami o‘zgarganda
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>

<script>
    // Statistika ma'lumotlarini olish
    async function fetchStats() {
        try {
            // Botdan statistikani olish uchun API
            // Bu URL ni botingizning API manziliga o‘zgartiring
            const response = await fetch('https://your-bot-domain.com/api/stats');
            const data = await response.json();
            
            document.getElementById('users-count').innerText = data.users || '0';
            document.getElementById('downloads-count').innerText = data.downloads || '0';
            document.getElementById('supporters-count').innerText = data.supporters || '0';
        } catch (error) {
            console.log('API ulanish xatosi, demo ma\'lumotlar ko\'rsatilmoqda');
            // Demo ma'lumotlar (API ishlamasa)
            document.getElementById('users-count').innerText = '3';
            document.getElementById('downloads-count').innerText = '0';
            document.getElementById('supporters-count').innerText = '0';
        }
    }
    
    // Botga o‘tish
    function openBot() {
        window.open('https://t.me/Bepul_media_bot', '_blank');
    }
    
    // Ulashish
    function shareBot() {
        const text = '🎯 Media Yuklab Oluvchi Bot\n\nYopiq kanal va guruhlardan media yuklab oling!\n\n@Bepul_media_bot';
        window.open(`https://t.me/share/url?url=${encodeURIComponent('https://t.me/Bepul_media_bot')}&text=${encodeURIComponent(text)}`, '_blank');
    }
    
    // Sahifa yuklanganda
    fetchStats();
    
    // Har 10 soniyada yangilash
    setInterval(fetchStats, 10000);
</script>

</body>
</html>
